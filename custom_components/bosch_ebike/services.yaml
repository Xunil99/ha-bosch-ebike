add_maintenance:
  fields:
    bike_id:
      required: true
      example: "abcdef-1234"
      selector:
        text:
    name:
      required: true
      example: "Chain swap"
      selector:
        text:
    interval_km:
      required: false
      example: 3000
      selector:
        number:
          min: 0.1
          max: 100000
          step: 0.1
          unit_of_measurement: km
    interval_days:
      required: false
      example: 365
      selector:
        number:
          min: 0.1
          max: 36500
          step: 1
          unit_of_measurement: d

complete_maintenance:
  fields:
    bike_id:
      required: true
      selector:
        text:
    item_id:
      required: true
      selector:
        text:

remove_maintenance:
  fields:
    bike_id:
      required: true
      selector:
        text:
    item_id:
      required: true
      selector:
        text:
