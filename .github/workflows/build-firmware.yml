name: Build ESPHome firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch/tag)'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    name: Build factory firmware for ESP32 and ESP32-C3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Build classic ESP32 firmware
        id: esphome-build-esp32
        uses: esphome/build-action@v7
        with:
          yaml-file: esphome/factory.yaml
          version: latest

      - name: Build ESP32-C3 firmware
        id: esphome-build-c3
        uses: esphome/build-action@v7
        with:
          yaml-file: esphome/factory-c3.yaml
          version: latest

      - name: Build Charge Limiter firmware (Sonoff BASICR4)
        id: esphome-build-charge-limiter
        uses: esphome/build-action@v7
        with:
          yaml-file: esphome/factory-charge-limiter.yaml
          version: latest

      - name: Build dual-bike ESP32 firmware
        id: esphome-build-dual
        uses: esphome/build-action@v7
        with:
          yaml-file: esphome/factory-dual.yaml
          version: latest

      - name: Collect firmware artifacts
        run: |
          set -euo pipefail
          mkdir -p firmware-output

          OUT_ESP32="${{ steps.esphome-build-esp32.outputs.name }}"
          echo "ESP32 build output dir: $OUT_ESP32"
          ls -la "$OUT_ESP32"
          cp "$OUT_ESP32"/*.factory.bin firmware-output/ebike-bridge.factory.bin
          cp "$OUT_ESP32"/*.ota.bin     firmware-output/ebike-bridge.ota.bin || true

          OUT_C3="${{ steps.esphome-build-c3.outputs.name }}"
          echo "ESP32-C3 build output dir: $OUT_C3"
          ls -la "$OUT_C3"
          cp "$OUT_C3"/*.factory.bin firmware-output/ebike-bridge-c3.factory.bin
          cp "$OUT_C3"/*.ota.bin     firmware-output/ebike-bridge-c3.ota.bin || true

          OUT_CL="${{ steps.esphome-build-charge-limiter.outputs.name }}"
          echo "Charge Limiter build output dir: $OUT_CL"
          ls -la "$OUT_CL"
          cp "$OUT_CL"/*.factory.bin firmware-output/ebike-charge-limiter.factory.bin
          cp "$OUT_CL"/*.ota.bin     firmware-output/ebike-charge-limiter.ota.bin || true

          OUT_DUAL="${{ steps.esphome-build-dual.outputs.name }}"
          echo "Dual-bike build output dir: $OUT_DUAL"
          ls -la "$OUT_DUAL"
          cp "$OUT_DUAL"/*.factory.bin firmware-output/ebike-bridge-dual.factory.bin
          cp "$OUT_DUAL"/*.ota.bin     firmware-output/ebike-bridge-dual.ota.bin || true

          ls -la firmware-output/

      - name: Generate manifest.json for ESP Web Tools (release-asset variant)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="dev"
          fi
          cat > firmware-output/manifest.json <<EOF
          {
            "name": "Bosch eBike LDI Bridge",
            "version": "${VERSION}",
            "home_assistant_domain": "esphome",
            "funding_url": "https://github.com/Xunil99/ha-bosch-ebike",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32",
                "improv": true,
                "parts": [
                  { "path": "ebike-bridge.factory.bin", "offset": 0 }
                ]
              },
              {
                "chipFamily": "ESP32-C3",
                "improv": true,
                "parts": [
                  { "path": "ebike-bridge-c3.factory.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF
          cat firmware-output/manifest.json

      # Use the annotated tag message as a short "What's changed" summary,
      # shown at the top of the release notes (and in the HACS update dialog).
      - name: Release notes from tag message
        if: startsWith(github.ref, 'refs/tags/v')
        id: relnotes
        run: |
          set -euo pipefail
          git fetch --tags --force origin >/dev/null 2>&1 || true
          {
            echo "body<<__EOF__"
            git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)'
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload firmware to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          # Tag message = curated "What's changed"; generate_release_notes
          # appends the detailed PR/commit list below it (shown in HACS).
          body: ${{ steps.relnotes.outputs.body }}
          generate_release_notes: true
          files: |
            firmware-output/ebike-bridge.factory.bin
            firmware-output/ebike-bridge.ota.bin
            firmware-output/ebike-bridge-c3.factory.bin
            firmware-output/ebike-bridge-c3.ota.bin
            firmware-output/ebike-charge-limiter.factory.bin
            firmware-output/ebike-charge-limiter.ota.bin
            firmware-output/ebike-bridge-dual.factory.bin
            firmware-output/ebike-bridge-dual.ota.bin
            firmware-output/manifest.json

      - name: Publish firmware to GitHub Pages (same-origin, CORS-safe)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Tag builds check out a detached tag that can lag behind main
          # (later commits pushed after the release). Base the firmware
          # commit on the CURRENT main so the push fast-forwards instead of
          # being rejected. firmware-output/ is untracked and survives the
          # checkout, so we copy the bins AFTER switching to main.
          git fetch origin main
          git checkout -B firmware-publish origin/main
          mkdir -p docs/firmware
          cp firmware-output/ebike-bridge.factory.bin    docs/firmware/ebike-bridge.factory.bin
          cp firmware-output/ebike-bridge.ota.bin        docs/firmware/ebike-bridge.ota.bin || true
          cp firmware-output/ebike-bridge-c3.factory.bin docs/firmware/ebike-bridge-c3.factory.bin
          cp firmware-output/ebike-bridge-c3.ota.bin     docs/firmware/ebike-bridge-c3.ota.bin || true
          cp firmware-output/ebike-charge-limiter.factory.bin docs/firmware/ebike-charge-limiter.factory.bin
          cp firmware-output/ebike-charge-limiter.ota.bin     docs/firmware/ebike-charge-limiter.ota.bin || true
          cp firmware-output/ebike-bridge-dual.factory.bin docs/firmware/ebike-bridge-dual.factory.bin
          cp firmware-output/ebike-bridge-dual.ota.bin     docs/firmware/ebike-bridge-dual.ota.bin || true
          git add docs/firmware/ebike-bridge.factory.bin \
                  docs/firmware/ebike-bridge.ota.bin \
                  docs/firmware/ebike-bridge-c3.factory.bin \
                  docs/firmware/ebike-bridge-c3.ota.bin \
                  docs/firmware/ebike-charge-limiter.factory.bin \
                  docs/firmware/ebike-charge-limiter.ota.bin \
                  docs/firmware/ebike-bridge-dual.factory.bin \
                  docs/firmware/ebike-bridge-dual.ota.bin
          if git diff --cached --quiet; then
            echo "No firmware changes to commit."
          else
            git commit -m "ci: publish firmware ${TAG} to docs/firmware for web installer"
            git push origin HEAD:main
          fi

      - name: Upload firmware as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: firmware-output/
          retention-days: 14
