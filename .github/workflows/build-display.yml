name: Build ESPHome display firmware

on:
  push:
    tags:
      - 'display-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build display firmware for JC4827W543 (ESP32-S3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Build display firmware
        id: esphome-build
        uses: esphome/build-action@v6
        with:
          yaml-file: esphome/display-jc4827w543.yaml
          version: latest

      - name: Collect firmware artifacts
        run: |
          set -euo pipefail
          OUT="${{ steps.esphome-build.outputs.name }}"
          echo "ESPHome build output dir: $OUT"
          ls -la "$OUT"
          mkdir -p firmware-output
          cp "$OUT"/*.factory.bin firmware-output/ebike-display.factory.bin
          cp "$OUT"/*.ota.bin firmware-output/ebike-display.ota.bin || true
          ls -la firmware-output/

      - name: Generate display manifest.json for the release asset
        run: |
          VERSION="${GITHUB_REF_NAME#display-v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="dev"
          fi
          cat > firmware-output/manifest-display.json <<EOF
          {
            "name": "Bosch eBike LDI Display",
            "version": "${VERSION}",
            "home_assistant_domain": "esphome",
            "funding_url": "https://github.com/Xunil99/ha-bosch-ebike",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "improv": true,
                "parts": [
                  { "path": "ebike-display.factory.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF
          cat firmware-output/manifest-display.json

      - name: Upload firmware to release
        if: startsWith(github.ref, 'refs/tags/display-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware-output/ebike-display.factory.bin
            firmware-output/ebike-display.ota.bin
            firmware-output/manifest-display.json

      - name: Publish display firmware to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/display-v')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p docs/firmware
          cp firmware-output/ebike-display.factory.bin docs/firmware/ebike-display.factory.bin
          cp firmware-output/ebike-display.ota.bin docs/firmware/ebike-display.ota.bin || true
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/firmware/ebike-display.factory.bin docs/firmware/ebike-display.ota.bin
          if git diff --cached --quiet; then
            echo "No display firmware changes to commit."
          else
            git commit -m "ci: publish display firmware ${TAG} to docs/firmware"
            git push origin HEAD:main
          fi

      - name: Upload firmware as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ebike-display-firmware
          path: firmware-output/
          retention-days: 14
