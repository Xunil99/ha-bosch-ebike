# Example ESPHome configuration for the Bosch eBike Live Data Interface bridge.
# Copy this file to your ESPHome config directory (e.g. /config/esphome/) and
# adjust the device name / friendly name to your liking. Make sure the
# `components/bosch_ebike_ldi/` folder lives next to this file.

esphome:
  name: ebike-bridge
  friendly_name: eBike Bridge
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  # board: esp32dev is set explicitly so PlatformIO uses the standard
  # ESP32-DevKitC board defaults (40 MHz crystal, DIO flash mode, standard
  # partition table). Without it, some ESPHome + ESP-IDF combinations fall
  # back to defaults that cause subtle WiFi RF instability and the symptom
  # "API connection issues" after a successful flash.
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      # NimBLE host stack with peripheral + GATT-client roles.
      # Bluedroid is disabled because the two stacks are mutually exclusive.
      CONFIG_BT_ENABLED: y
      CONFIG_BT_NIMBLE_ENABLED: y
      CONFIG_BT_BLUEDROID_ENABLED: n
      CONFIG_BT_CONTROLLER_ENABLED: y
      CONFIG_BTDM_CTRL_MODE_BLE_ONLY: y
      CONFIG_BTDM_CTRL_MODE_BR_EDR_ONLY: n
      CONFIG_BTDM_CTRL_MODE_BTDM: n
      CONFIG_BT_NIMBLE_MAX_CONNECTIONS: "1"
      CONFIG_BT_NIMBLE_ROLE_PERIPHERAL: y
      CONFIG_BT_NIMBLE_ROLE_BROADCASTER: y
      # Central role enables the GATT client API (ble_gattc_*).
      # The eBike connects to us as Central, but on that connection we act as
      # GATT *client* against the eBike's GATT *server* on the Live Data Service.
      CONFIG_BT_NIMBLE_ROLE_CENTRAL: y
      CONFIG_BT_NIMBLE_ROLE_OBSERVER: y
      CONFIG_BT_NIMBLE_SM_LEGACY: n
      CONFIG_BT_NIMBLE_SM_SC: y
      CONFIG_BT_NIMBLE_NVS_PERSIST: y
      CONFIG_BT_NIMBLE_ATT_PREFERRED_MTU: "247"

logger:
  level: DEBUG
  logs:
    bosch_ebike_ldi: DEBUG

api:

# Optional: MQTT zusaetzlich zur Native-API.
#
# Bestehende Setups muessen NICHTS aendern - dieser Block ist
# auskommentiert und rein opt-in. Die Native-API (oben) bleibt der
# Standard.
#
# Wann MQTT sinnvoll ist: beim mobilen Einsatz (ESP roamt zwischen
# Heim-WLAN und Handy-Hotspot, z.B. an einer Powerbank in der
# Fahrradtasche). Bei der Native-API baut HOME ASSISTANT die Verbindung
# zum ESP auf und muss dessen IP kennen - die wechselt aber unterwegs
# (Hotspot-DHCP / WireGuard-Tunnel-IP), wodurch HA das Geraet nicht mehr
# erreicht. Bei MQTT PUSHT der ESP seine Daten aktiv an den Broker,
# daher ist die wechselnde IP egal.
#
# Voraussetzung: MQTT-Broker in HA (z.B. das Mosquitto-Add-on).
#
# Hinweis: Wenn api: aktiv bleibt UND mqtt: an ist, kann das Geraet in
# HA doppelt auftauchen (einmal ueber die ESPHome-Integration, einmal
# ueber MQTT-Discovery). Fuer reinen Roaming-Betrieb daher ggf. das
# api:-Schluesselwort oben auskommentieren.
#
# mqtt:
#   broker: 192.168.2.10           # IP des HA-/Mosquitto-Brokers
#   username: !secret mqtt_user
#   password: !secret mqtt_password
#   # discovery: true ist Default - Entities erscheinen automatisch in HA

ota:
  - platform: esphome

wifi:
  # Heimnetz ist aktiv (noetig fuer Auto-Flash / OTA-Erreichbarkeit).
  # Fuer den mobilen Einsatz in der Fahrradtasche die hotspot-Zeilen
  # unten einkommentieren. Mit mehreren Netzen KEIN fast_connect
  # verwenden (sonst wird nur das erste Netz probiert).
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  #   - ssid: !secret hotspot_ssid
  #     password: !secret hotspot_password

# Optional: WireGuard-Tunnel zum Heim-Home-Assistant, wenn die Bridge
# unterwegs am Handy-Hotspot haengt (z.B. ESP mit Powerbank in der
# Fahrradtasche). Damit bleibt das Geraet fuer HA erreichbar, als waere
# es im Heimnetz.
#
# Voraussetzung: WireGuard-Server zuhause (HA-Add-on oder direkt in der
# FritzBox) + Port-Forwarding/DynDNS. Bei der FritzBox liefert die
# WireGuard-Konfiguration alle Werte (Endpoint via *.myfritz.net,
# PublicKey, PresharedKey, zugewiesene Address).
#
# WICHTIG:
#  - WireGuard braucht zwingend eine 'time:'-Komponente (sonst
#    Config-Fehler "Component wireguard requires component time").
#    Darum den time:-Block unten mit einkommentieren.
#  - peer_allowed_ips bewusst nur auf das Heim-Subnetz beschraenken,
#    damit normaler Internet-Traffic (NTP, Open-Meteo etc.) am Hotspot
#    bleibt und nur HA-Verkehr durch den Tunnel geht.
#  - Wenn die FritzBox dem ESP eine Tunnel-IP IM Heim-Subnetz zuweist
#    (z.B. 192.168.2.x), darf der Tunnel zuhause NICHT aktiv sein, sonst
#    Routing-Konflikt. Loesung: per wifi_info-ssid den Tunnel nur am
#    Hotspot einschalten (siehe text_sensor-Beispiel weiter unten).

# time:
#   - platform: sntp
#     id: sntp_time
#     servers:
#       - 0.pool.ntp.org
#       - 1.pool.ntp.org

# wireguard:
#   address: 192.168.2.203            # vom WireGuard-Server zugewiesen
#   private_key: !secret wg_private_key
#   peer_endpoint: dein-host.myfritz.net
#   peer_port: 51820
#   peer_public_key: !secret wg_peer_public_key
#   peer_preshared_key: !secret wg_preshared_key   # FritzBox liefert das
#   peer_allowed_ips:
#     - 192.168.2.0/24                # nur Heim-Subnetz (Split-Tunnel)
#   peer_persistent_keepalive: 25s

# Tunnel nur am Hotspot aktivieren, zuhause aus (verhindert
# Subnetz-Konflikt). SSID exakt wie im wifi.networks-Block oben.
# text_sensor:
#   - platform: wifi_info
#     ssid:
#       name: "WLAN SSID"
#       on_value:
#         then:
#           - if:
#               condition:
#                 lambda: 'return x == "Mein-Hotspot-Name";'
#               then:
#                 - wireguard.enable:
#               else:
#                 - wireguard.disable:

# Optional: Tunnel-Status (an/aus) als Sensor in HA.
# binary_sensor:
#   - platform: wireguard
#     status:
#       name: "WireGuard Status"

web_server:
  port: 80
  version: 3

# Pull the bridge component straight from GitHub on every compile.
# This way you always get the latest fixes without copying files around.
# Pin to a tag (e.g. @v1.10.0) instead of @main if you want reproducible builds.
external_components:
  - source: github://Xunil99/ha-bosch-ebike@main
    components: [bosch_ebike_ldi]
    refresh: 1d

# Alternative for offline / air-gapped setups: copy the
# `esphome/components/bosch_ebike_ldi/` folder from the repo next to this YAML
# and replace the block above with:
#
# external_components:
#   - source:
#       type: local
#       path: components

bosch_ebike_ldi:
  id: ebike_bridge
  device_name: "HA eBike Bridge"

# Charge-time estimate: while charging, measure the charging rate (%/min) from
# the rising SoC and extrapolate the remaining time to 80 % and to 100 %. Two
# fixed targets so the charge limit set in the Flow app does not need to be read.
globals:
  - id: chg_rate          # smoothed charging rate in %/min, -1 = unknown
    type: float
    restore_value: no
    initial_value: '-1'
  - id: chg_last_soc      # last SoC reference point
    type: float
    restore_value: no
    initial_value: '-1'
  - id: chg_last_ms       # timestamp (millis) of the last SoC reference point
    type: uint32_t
    restore_value: no
    initial_value: '0'

sensor:
  - platform: bosch_ebike_ldi
    bosch_ebike_ldi_id: ebike_bridge
    speed:
      name: "eBike Speed"
    cadence:
      name: "eBike Cadence"
    rider_power:
      name: "eBike Rider Power"
    ambient_brightness:
      name: "eBike Ambient Brightness"
    battery_soc:
      name: "eBike Battery SoC (Live)"
      id: batt_soc
      on_value:
        # Update the charging-rate estimate once per full SoC percent gained.
        - lambda: |-
            if (!id(charger_conn).state || std::isnan(x)) return;
            if (id(chg_last_soc) < 0) {
              id(chg_last_soc) = x; id(chg_last_ms) = millis(); return;
            }
            float dsoc = x - id(chg_last_soc);
            if (dsoc >= 1.0f) {
              float dmin = (millis() - id(chg_last_ms)) / 60000.0f;
              if (dmin > 0.01f) {
                float r = dsoc / dmin;
                if (r > 0)
                  id(chg_rate) = (id(chg_rate) < 0) ? r
                                                    : (0.3f * r + 0.7f * id(chg_rate));
              }
              id(chg_last_soc) = x;
              id(chg_last_ms) = millis();
            }
    odometer:
      name: "eBike Odometer (Live)"

  # Estimated remaining charging time (minutes). NAN -> "unknown" until a
  # reliable rate has built up. Target 80 % stays in the linear CC region, so
  # it is quite accurate; target 100 % adds a slowdown factor for the CV tail.
  - platform: template
    name: "eBike Charge Time to 80% (Estimate)"
    id: chg_eta_80
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      if (!id(charger_conn).state) return NAN;
      float soc = id(batt_soc).state;
      float rate = id(chg_rate);
      if (rate <= 0 || std::isnan(soc) || soc >= 80.0f) return NAN;
      return (80.0f - soc) / rate;
  - platform: template
    name: "eBike Charge Time to 100% (Estimate)"
    id: chg_eta_100
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      if (!id(charger_conn).state) return NAN;
      float soc = id(batt_soc).state;
      float rate = id(chg_rate);
      if (rate <= 0 || std::isnan(soc) || soc >= 100.0f) return NAN;
      const float cv_start = 85.0f, cv_factor = 2.5f;
      float mins = 0.0f, s = soc;
      if (s < cv_start) { mins += (cv_start - s) / rate; s = cv_start; }
      mins += (100.0f - s) / (rate / cv_factor);
      return mins;

binary_sensor:
  - platform: bosch_ebike_ldi
    bosch_ebike_ldi_id: ebike_bridge
    connected:
      name: "eBike Connected"
    light:
      name: "eBike Light"
    system_locked:
      name: "eBike System Locked"
    charger_connected:
      name: "eBike Charger Connected"
      id: charger_conn
      on_state:
        # Reset the estimate on every charger plug/unplug; the first SoC reading
        # while charging re-seeds the reference point.
        - lambda: |-
            id(chg_rate) = -1;
            id(chg_last_soc) = -1;
            id(chg_last_ms) = millis();
    light_reserve:
      name: "eBike Light Reserve"
    diagnosis_active:
      name: "eBike Diagnosis Active"
    in_motion:
      name: "eBike In Motion"

# Optional: button to wipe the BLE bond from NVS. Useful if pairing breaks
# (for example after removing the accessory in the Flow app). Re-pair afterwards.
button:
  - platform: template
    name: "eBike Clear Bonding"
    on_press:
      then:
        - lambda: |-
            id(ebike_bridge).clear_bonding();
