# Factory firmware configuration for the pre-built Bosch eBike LDI bridge.
#
# This YAML produces the binary distributed via ESP Web Tools at
# https://xunil99.github.io/ha-bosch-ebike/. End users do NOT need to run
# ESPHome themselves to use this binary. After flashing, the device boots
# into Improv-Serial WiFi setup so the same browser flow can hand over the
# network credentials.
#
# DIY users who want to tweak entity names, build flags, or add automations
# should use example-bridge.yaml instead.

esphome:
  name: ebike-bridge
  friendly_name: eBike Bridge
  min_version: 2025.11.0
  name_add_mac_suffix: true
  project:
    name: "xunil99.bosch_ebike_ldi"
    version: "1.0.0"

esp32:
  variant: esp32
  # board: esp32dev pins PlatformIO to the standard ESP32-DevKitC defaults
  # (40 MHz crystal, DIO flash, standard partition table). Without this,
  # some ESPHome + ESP-IDF combinations fall back to defaults that cause
  # subtle WiFi RF instability after a successful flash (symptom: device
  # boots but the ESPHome API in HA reports "connection issues").
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_ENABLED: y
      CONFIG_BT_NIMBLE_ENABLED: y
      CONFIG_BT_BLUEDROID_ENABLED: n
      CONFIG_BT_CONTROLLER_ENABLED: y
      CONFIG_BTDM_CTRL_MODE_BLE_ONLY: y
      CONFIG_BTDM_CTRL_MODE_BR_EDR_ONLY: n
      CONFIG_BTDM_CTRL_MODE_BTDM: n
      CONFIG_BT_NIMBLE_MAX_CONNECTIONS: "1"
      CONFIG_BT_NIMBLE_ROLE_PERIPHERAL: y
      CONFIG_BT_NIMBLE_ROLE_BROADCASTER: y
      CONFIG_BT_NIMBLE_ROLE_CENTRAL: y
      CONFIG_BT_NIMBLE_ROLE_OBSERVER: y
      CONFIG_BT_NIMBLE_SM_LEGACY: n
      CONFIG_BT_NIMBLE_SM_SC: y
      CONFIG_BT_NIMBLE_NVS_PERSIST: y
      CONFIG_BT_NIMBLE_ATT_PREFERRED_MTU: "247"

logger:
  # Component-level log levels must not be more verbose than the global
  # level. We want DEBUG output from the bridge component so users can
  # debug pairing or BLE link issues, hence the global level is DEBUG too.
  level: DEBUG
  logs:
    bosch_ebike_ldi: DEBUG

# No baked-in WiFi credentials. The end user supplies them via:
#   1. Improv-Serial (same browser session that flashed the firmware), or
#   2. The AP fallback (eBike Bridge Setup) plus captive portal.
wifi:
  ap:
    ssid: "eBike Bridge Setup"

captive_portal:

improv_serial:

api:

ota:
  - platform: esphome

external_components:
  - source: github://Xunil99/ha-bosch-ebike@main
    components: [bosch_ebike_ldi]
    refresh: 1d

bosch_ebike_ldi:
  id: ebike_bridge
  device_name: "HA eBike Bridge"

# Charge-time estimate: while charging, measure the charging rate (%/min) from
# the rising SoC and extrapolate the remaining time to 80 % and to 100 %. Two
# fixed targets so the charge limit set in the Flow app does not need to be read.
globals:
  - id: chg_rate          # smoothed charging rate in %/min, -1 = unknown
    type: float
    restore_value: no
    initial_value: '-1'
  - id: chg_last_soc      # last SoC reference point
    type: float
    restore_value: no
    initial_value: '-1'
  - id: chg_last_ms       # timestamp (millis) of the last SoC reference point
    type: uint32_t
    restore_value: no
    initial_value: '0'

sensor:
  - platform: bosch_ebike_ldi
    bosch_ebike_ldi_id: ebike_bridge
    speed:
      name: "eBike Speed"
    cadence:
      name: "eBike Cadence"
    rider_power:
      name: "eBike Rider Power"
    ambient_brightness:
      name: "eBike Ambient Brightness"
    battery_soc:
      name: "eBike Battery SoC (Live)"
      id: batt_soc
      on_value:
        - lambda: |-
            if (!id(charger_conn).state || std::isnan(x)) return;
            if (id(chg_last_soc) < 0) {
              id(chg_last_soc) = x; id(chg_last_ms) = millis(); return;
            }
            float dsoc = x - id(chg_last_soc);
            if (dsoc >= 1.0f) {
              float dmin = (millis() - id(chg_last_ms)) / 60000.0f;
              if (dmin > 0.01f) {
                float r = dsoc / dmin;
                if (r > 0)
                  id(chg_rate) = (id(chg_rate) < 0) ? r
                                                    : (0.3f * r + 0.7f * id(chg_rate));
              }
              id(chg_last_soc) = x;
              id(chg_last_ms) = millis();
            }
    odometer:
      name: "eBike Odometer (Live)"

  # Estimated remaining charging time (minutes). NAN -> "unknown" until a
  # reliable rate has built up. 80 % stays in the linear CC region (accurate);
  # 100 % adds a slowdown factor for the CV tail.
  - platform: template
    name: "eBike Restladezeit bis 80% (Schätzung)"
    id: chg_eta_80
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      if (!id(charger_conn).state) return NAN;
      float soc = id(batt_soc).state;
      float rate = id(chg_rate);
      if (rate <= 0 || std::isnan(soc) || soc >= 80.0f) return NAN;
      return (80.0f - soc) / rate;
  - platform: template
    name: "eBike Restladezeit bis 100% (Schätzung)"
    id: chg_eta_100
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      if (!id(charger_conn).state) return NAN;
      float soc = id(batt_soc).state;
      float rate = id(chg_rate);
      if (rate <= 0 || std::isnan(soc) || soc >= 100.0f) return NAN;
      const float cv_start = 85.0f, cv_factor = 2.5f;
      float mins = 0.0f, s = soc;
      if (s < cv_start) { mins += (cv_start - s) / rate; s = cv_start; }
      mins += (100.0f - s) / (rate / cv_factor);
      return mins;

binary_sensor:
  - platform: bosch_ebike_ldi
    bosch_ebike_ldi_id: ebike_bridge
    connected:
      name: "eBike Connected"
    light:
      name: "eBike Light"
    system_locked:
      name: "eBike System Locked"
    charger_connected:
      name: "eBike Charger Connected"
      id: charger_conn
      on_state:
        - lambda: |-
            id(chg_rate) = -1;
            id(chg_last_soc) = -1;
            id(chg_last_ms) = millis();
    light_reserve:
      name: "eBike Light Reserve"
    diagnosis_active:
      name: "eBike Diagnosis Active"
    in_motion:
      name: "eBike In Motion"

button:
  - platform: template
    name: "eBike Clear Bonding"
    on_press:
      then:
        - lambda: |-
            id(ebike_bridge).clear_bonding();

# Vorsorglicher Reboot alle 6 Stunden. Haelt den NimBLE-Stack frisch
# und beugt seltenen Edge-Cases (Memory-Fragmentation, haengende BLE-
# Connections, WiFi-Driver-Glitches) vor. Im Idle-Fall unauffaellig,
# der Reboot dauert wenige Sekunden.
interval:
  - interval: 6h
    # ESPHome runs interval actions ONCE at boot by default. Without this
    # startup_delay the 6h reboot fires ~3 s after every boot, so the device
    # reboots every few seconds and the setup AP never stays up long enough
    # to be joined. startup_delay defers the first run by a full interval.
    startup_delay: 6h
    then:
      - logger.log:
          level: WARN
          format: "Scheduled 6h reboot"
      - delay: 5s
      - lambda: 'App.safe_reboot();'
